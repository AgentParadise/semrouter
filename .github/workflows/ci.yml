name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: read

jobs:
  test:
    name: Test (all features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Cache fastembed model
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .fastembed_cache
          key: fastembed-AllMiniLML6V2-v1
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --release --all-features
      - run: cargo test --test contract --release --all-features -- --nocapture
      - name: cargo doc
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"
      - run: cargo build --examples --release --all-features
      - run: cargo publish --dry-run

  lean-build:
    name: Lean (default — no features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo build
      - run: cargo test --lib
      - name: Verify dep count
        run: |
          count=$(cargo tree --edges normal | grep -oE "[a-z0-9_-]+ v[0-9]" | sort -u | wc -l)
          echo "Lean dep count (default features): $count"
          if [ "$count" -gt 25 ]; then
            echo "::error::Default profile dep count grew above 25 — a new default dep slipped in. Investigate."
            exit 1
          fi

  fastembed-only:
    name: Fastembed feature (no CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Cache fastembed model
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .fastembed_cache
          key: fastembed-AllMiniLML6V2-v1
      - run: cargo build --features fastembed
      - run: cargo test --features fastembed --release

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@e5de28abeb52d916c5e5875d54b21a9e738b61ec # cargo-llvm-cov
      - name: Cache fastembed model
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .fastembed_cache
          key: fastembed-AllMiniLML6V2-v1
      - name: Run coverage
        run: |
          cargo llvm-cov clean --workspace
          # main.rs is the CLI binary entrypoint; smoke-tested elsewhere.
          # 60% floor for v0.1.1; raise as test surface grows.
          cargo llvm-cov --all-features --workspace --release \
            --ignore-filename-regex '(examples/|tests/fixtures/|src/main\.rs)' \
            --summary-only --fail-under-lines 60 \
            -- --include-ignored

  cargo-audit:
    name: Cargo audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: rustsec/audit-check@858dc40f52ca2b8570b7a997c1c4e35c6fc9a432 # master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  cargo-deny:
    name: Cargo deny
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb # v2
        with:
          command: check all
