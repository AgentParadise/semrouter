name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test (default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Cache fastembed model
        uses: actions/cache@v4
        with:
          path: .fastembed_cache
          key: fastembed-AllMiniLML6V2-v1
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --release
      - run: cargo test --test contract --release -- --nocapture
      - name: cargo doc
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"
      - run: cargo build --examples --release
      - run: cargo publish --dry-run

  lean-build:
    name: Lean (no default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --no-default-features
      - run: cargo test --no-default-features --lib
      - name: Verify dep count
        run: |
          count=$(cargo tree --no-default-features --edges normal | grep -oE "[a-z0-9_-]+ v[0-9]" | sort -u | wc -l)
          echo "Lean dep count: $count"
          if [ "$count" -gt 25 ]; then
            echo "::error::Lean profile dep count grew above 25; investigate."
            exit 1
          fi

  fastembed-only:
    name: Fastembed-only (no CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cache fastembed model
        uses: actions/cache@v4
        with:
          path: .fastembed_cache
          key: fastembed-AllMiniLML6V2-v1
      - run: cargo build --no-default-features --features fastembed
      - run: cargo test --no-default-features --features fastembed --release
